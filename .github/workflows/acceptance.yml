name: Acceptance

# Acceptance suite is too slow for every PR — run nightly + on-demand.
on:
  schedule:
    - cron: "0 4 * * *" # 04:00 UTC nightly
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: acceptance-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  images:
    name: Image acceptance suite
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sudo sh -s -- -b /usr/local/bin

      - name: Run image acceptance tests
        run: |
          go test -tags acceptance -v -timeout 30m \
            ./test/acceptance/images/...

  validators:
    name: External validators
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sudo sh -s -- -b /usr/local/bin

      - name: Install cyclonedx-cli
        run: |
          curl -sSfL -o cyclonedx \
            https://github.com/CycloneDX/cyclonedx-cli/releases/latest/download/cyclonedx-linux-x64
          sudo install cyclonedx /usr/local/bin/cyclonedx

      - name: Install pyspdxtools
        run: |
          python3 -m pip install --user spdx-tools
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install bomctl
        run: |
          curl -sSfL https://raw.githubusercontent.com/bomctl/bomctl/main/scripts/install.sh \
            | sudo sh -s -- -b /usr/local/bin

      - name: Run validator acceptance tests
        run: |
          go test -tags acceptance -v -timeout 30m \
            ./test/acceptance/validators/...

  scanners:
    name: Vulnerability scanners
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sudo sh -s -- -b /usr/local/bin

      - name: Install grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh \
            | sudo sh -s -- -b /usr/local/bin

      - name: Install osv-scanner
        run: |
          go install github.com/google/osv-scanner/cmd/osv-scanner@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install trivy
        run: |
          curl -sSfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sudo sh -s -- -b /usr/local/bin

      - name: Run scanner acceptance tests
        run: |
          go test -tags acceptance -v -timeout 30m \
            ./test/acceptance/scanners/...

  runtimes:
    name: Multi-runtime matrix (${{ matrix.runtime }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        runtime: [docker, buildkit, podman, buildah]
        # kaniko intentionally omitted from CI matrix — needs an
        # `executor` binary the suite skips automatically when
        # missing. Add a self-hosted runner with kaniko to enable.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install runtime — podman
        if: matrix.runtime == 'podman'
        run: sudo apt-get update && sudo apt-get install -y podman

      - name: Install runtime — buildah
        if: matrix.runtime == 'buildah'
        run: sudo apt-get update && sudo apt-get install -y buildah

      - name: Install syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sudo sh -s -- -b /usr/local/bin

      - name: Run runtime acceptance tests (${{ matrix.runtime }})
        run: |
          go test -tags acceptance -v -timeout 30m \
            -run "TestAcceptance_FiveRuntimes/${{ matrix.runtime }}" \
            ./test/acceptance/runtimes/...

  benchmarks:
    name: Performance benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sudo sh -s -- -b /usr/local/bin

      - name: Run benchmarks
        run: |
          go test -tags benchmark -v -timeout 50m -bench=. -benchtime=1x \
            ./test/benchmarks/...
