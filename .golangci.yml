version: "2"

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - revive
    - gosec
    - gocyclo
    - gocognit
    - misspell
    - unparam
    - unconvert
    - prealloc
    - bodyclose
    - contextcheck
    - errorlint
    - exhaustive
    - nilerr
    - nilnil
    - noctx
    - thelper
    - tparallel
    - wastedassign
    - ineffassign
    - unused

  settings:
    gocyclo:
      min-complexity: 15
    gocognit:
      min-complexity: 20
    revive:
      severity: warning
      rules:
        - name: var-naming
        - name: exported
        - name: package-comments
        - name: unused-parameter
          disabled: true
    gosec:
      excludes:
        # G104: Errors unhandled - errcheck already covers this with finer
        # control via `//nolint:errcheck` directives where appropriate.
        - G104
    exhaustive:
      default-signifies-exhaustive: true

  exclusions:
    presets:
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - path: _test\.go
        linters:
          - gocyclo
          - gocognit
          - gosec
          - errcheck
          - unparam
          - revive

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/psyf8t/astinus

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
